<!DOCTYPE html>
<html lang="uk">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Інтерполяція Лагранжа</title>

        <link rel="stylesheet" href="style.css">

        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>

    <body>

        <div class="container">

            <header>
                <h1>Апроксимація функцій</h1>

                <p class="subtitle">
                    Інтерполяція поліномом Лагранжа
                </p>
            </header>

            <div class="main-grid">

                <aside class="sidebar">

                    <div class="card">

                        <h2>Вхідні дані</h2>

                        <label>Точки (x, y)</label>

                        <textarea id="points">
1,1.5
2,0.8
3,0.5
4,0.4
5,0.3
                    </textarea>

                        <button id="build-btn">
                            Побудувати поліном
                        </button>

                    </div>

                    <div class="card">

                        <h2>Результат</h2>

                        <div id="result-area">

                            <p class="placeholder">
                                Поліном ще не побудовано
                            </p>

                        </div>

                    </div>

                </aside>

                <main class="content">

                    <div class="card">

                        <h2>Таблиця точок</h2>

                        <div id="table-container">

                        </div>

                    </div>

                    <div class="card">

                        <h2>Графік</h2>

                        <canvas id="chart"></canvas>

                    </div>

                </main>

            </div>

        </div>

        <script src="script.js"></script>

    </body>

</html>
